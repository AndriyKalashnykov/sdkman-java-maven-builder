# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: main

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Download repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

    - name: Cache Docker layers
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Login to DockerHub
      if: github.ref_type == 'tag'
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push sdkman image - mvn-3.9.14-jdk-21.0.10-tem
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
      with:
        context: .
        file: ./Dockerfile
        build-args: |
          JAVA_VERSION=21.0.10-tem
          MAVEN_VERSION=3.9.14
        platforms: linux/amd64
        push: ${{ github.ref_type == 'tag' }}
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/sdkman:mvn-3.9.14-jdk-21.0.10-tem
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push sdkman image - mvn-3.9.14-jdk-17.0.18-tem
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
      with:
        context: .
        file: ./Dockerfile
        build-args: |
          JAVA_VERSION=17.0.18-tem
          MAVEN_VERSION=3.9.14
        platforms: linux/amd64
        push: ${{ github.ref_type == 'tag' }}
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/sdkman:mvn-3.9.14-jdk-17.0.18-tem
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push sdkman image - mvn-3.9.14-jdk-11.0.30-tem
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
      with:
        context: .
        file: ./Dockerfile
        build-args: |
          JAVA_VERSION=11.0.30-tem
          MAVEN_VERSION=3.9.14
        platforms: linux/amd64
        push: ${{ github.ref_type == 'tag' }}
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/sdkman:mvn-3.9.14-jdk-11.0.30-tem
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push sample image
      if: github.ref_type == 'tag'
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
      with:
        context: ./sample/
        file: ./sample/Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/bitnami-tomcat9-jdk18-root-war:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
